worker_processes auto;

events {
    worker_connections 8192;
}

http {
    upstream my_app {
        server host.docker.internal:80;  # or your IP/port
    }

    server {
        listen 8080;
        server_name _;

        location / {
            proxy_pass http://my_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
